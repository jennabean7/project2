<!DOCTYPE html>
<html>
<head>
    <title>WORDLE - Jenna's Version!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="main.css" rel="stylesheet">
    <script>
        // Store correct word and guess count as global variables
        var correctWord = "alert"
        var guessCount = 0;
        var guessedWords = []
        // BEGIN onload function
        window.onload = function() {
            // Set function on 'check guess' button click
            document.getElementById("checkGuess").onclick = checkWord;
            document.getElementById("enter").onclick = checkWord
            document.getElementById("reset").onclick = reset;
        }

        // BEGIN validateWord()
        // Checks if word entered is valid - i.e. correct length, not reused
        function validateWord(theWord){
            // Check if each character is alphabetic
            for(const char of theWord){
                if(!(/[a-zA-Z]/.test(char))){
                    alert("Invalid word: non-alphabetic characters.");
                    return false;
                } // END if
            } // END for
            if(theWord.length > 5){
                alert("Invalid word: too many characters.")
                return false;
            } // END if
            if(theWord.length < 5){
                alert("Invalid word: not enough characters.")
                return false;
            } // END if

            // Check if word has already been guessed
            if(guessedWords.includes(theWord)){
                alert("Already guessed.")
                return false;
            } else{
                guessedWords.push(theWord)
                return true;
            } // END if/else
        } // END validateWord()

        // BEGIN checkLetters()
        // Checks letters in entered word against those in correct word, determines whether box should be green/yellow/white
        function checkLetters(guessWord){
            // Store guessTable as variable
            var guessTable = document.getElementById("guessTable");

            // Convert the guessed word and correct word into arrays
            const wordChars = Array.from(guessWord);
            var correctLetters = Array.from(correctWord)

            // First pass over guessed word to find correct letters
            wordChars.forEach((character, index) => {
                // Get the TD to insert the letter into and insert it
                charPosition = guessTable.rows[guessCount-1].cells[index]
                charPosition.innerHTML = "<h2>" + character.toUpperCase() + "</h2>";
                // Get the associated letter on the letterboard
                lbChar = document.getElementById(character)

                // If the char at index in guessed word is at same index in correct word, mark green
                if(character == correctWord[index]){
                    charPosition.style.backgroundColor = 'green';
                    lbChar.style.backgroundColor = 'green';
                    charPosition.style.color = 'white';
                    // Remove it from correct letters so it doesn't get written over in yellow
                    correctLetters[index] = null;
                } // END if
            }) // END forEach

            // Second pass over guessed word to find duplicates or wrong letters
            wordChars.forEach((character, index) => {
                // Get TD to insert letter into and insert it
                charPosition = guessTable.rows[guessCount-1].cells[index]
                // Get assoc letter on LB
                lbChar = document.getElementById(character)

                // If we already marked this char, move to next char
                if(correctLetters[index] == null){
                    return;
                } // END if

                // Find the location of the guessed character in the word (check existence)
                dupeLetter = correctLetters.indexOf(character)
                // If the character exists, mark it yellow 
                if(dupeLetter !== -1){
                    charPosition.style.backgroundColor = 'yellow';
                    lbChar.style.backgroundColor = 'yellow';
                    // Remove from correct letters so it doesn't get written over in gray
                    correctLetters[dupeLetter] = null;
                } else{
                    // If the guessed char is not in the correct word, mark it gray
                    charPosition.style.backgroundColor = 'gray';
                    lbChar.style.backgroundColor = 'gray';
                } // END if/else
            }) // END forEach
        } // END checkLetters()

        // BEGIN checkWord
        function checkWord(){
            // Get the guessed word from textbox
            var guessWord = document.getElementById("guess").value.toLowerCase()
            
            // Validate the word
            if(!validateWord(guessWord)){
                return; // break if not a valid word
            } // END if

            // Increment guessCount
            guessCount++;

            // Check each letter
            checkLetters(guessWord)

            // Clear the guessed word from input
            document.getElementById("guess").value = ""

            // If guessed word is the correct word, alert win!!
            if(guessWord === correctWord.toLowerCase()){
                alert('You win!')
                document.getElementById("checkGuess").style.display = 'none';
                document.getElementById("reset").style.display = 'inline';
                return;
            } // END if
            // If out of guesses and word not correct, reveal word
            if(guessCount == 6){
                alert('You lose. The word was: ' + correctWord)
                console.log(correctWord);
                document.getElementById("checkGuess").style.display = 'none';
                document.getElementById("reset").style.display = 'inline';
                return;
            } // END if
        } // END checkWord

        // Reset the game
        // BEGIN reset()
        function reset(){
            // Get the TDs in the guess table to reset
            var guessLetters = document.querySelectorAll("#guessTable td.letter")
            // Get the TDs in the LB table to reset
            var lbLetters = document.querySelectorAll("#letterboard td.letter")

            // Reset each TD (remove styling and text)
            guessLetters.forEach((item) => {
                item.innerHTML = ''
                item.style.backgroundColor = 'white';
                item.style.color = 'black';
            }) // END forEach

            // Reset each TD (remove background color)
            lbLetters.forEach((item) => {
                item.style.backgroundColor = 'white';
            }) // END forEach

            // Hide the reset button, display the check button, reset guess count and guessed words
            document.getElementById("reset").style.display = 'none';
            document.getElementById("checkGuess").style.display = 'inline';
            guessCount = 0;
            guessedWords = [];
        } // END reset
    </script>
</head>

<body>

    <hr>
    <div id="guesses">

            <tr id="guess1">

            <tr id="guess2">

                <td class="letter"></td>

            <tr id="guess3">
                <td class="letter"></td>

            <tr id="guess4">

            <tr id="guess5">

            <tr id="guess6">

                <td class="letter" id="p" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'p'">P</td>
            </tr>
        </table>
        <table>
            <tr id="middle">
                <td class="letter" id="a" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'a'">A</td>

                <td class="letter" id="g" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'g'">G</td>
                <td class="letter" id="h" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'h'">H</td>
                <td class="letter" id="j" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'j'">J</td>
                <td class="letter" id="k" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'k'">K</td>
                <td class="letter" id="l" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'l'">L</td>
            </tr>
        </table>
        <table>
            <tr id="bottom">
                <td id="enter">Enter</td>
                <td class="letter" id="z" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'z'">Z</td>
                <td class="letter" id="x" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'x'">X</td>
                <td class="letter" id="c" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'c'">C</td>
                <td class="letter" id="v" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'v'">V</td>
                <td class="letter" id="b" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'b'">B</td>
                <td class="letter" id="n" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'n'">N</td>
                <td class="letter" id="m" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'm'">M</td>
                <td class="letter" id="m" onclick="document.getElementById('guess').value = document.getElementById('guess').value + 'm'">M</td>
                <td class="letter" id="del" onclick="document.getElementById('guess').value = document.getElementById('guess').value.slice(0, -1)">del</td>
            </tr>

    </div>

</body>
