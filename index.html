<!DOCTYPE html>
<html>
<head>
    <title>WORDLE - Jenna's Version!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="main.css" rel="stylesheet">
    <script>
        // Store correct word and guess count as global variables
        var correctWord = "alert"
        var guessCount = 0;
        // BEGIN onload function
        window.onload = function() {
            // Set function on 'check guess' button click
            document.getElementById("checkGuess").onclick = checkWord;
            // Store guessTable as variable for use later
            guessTable = document.getElementById("guessTable");
        }
        // BEGIN checkWord
        function checkWord(){
            // Get the guessed word from textbox
            var guessWord = document.getElementById("guess").value.toLowerCase()
            // If guess is too long or short, error and return (break function)
            if(guessWord.length > 5){
                alert("Invalid word: too many characters.")
                return;
            } // END if
            if(guessWord.length < 5){
                alert("Invalid word: not enough characters.")
                return;
            } // END if

            // Increment guessCount
            guessCount++;
            // Convert guessed word to an array
            const wordChars = Array.from(guessWord)
            // Loop through each letter in word
            for(i = 0; i < guessTable.rows[guessCount-1].cells.length; i++){
                // Get the TD to insert the letter into, insert the letter
                placeChar = guessTable.rows[guessCount-1].cells[i]
                placeChar.innerHTML = wordChars[i];
                // Get the associated letter on the letterboard
                lbChar = document.getElementById(wordChars[i])
                // If letter placement is correct, LB and guess board backgrounds green
                if(wordChars[i] == correctWord[i]){
                    placeChar.style.backgroundColor = 'green';
                    lbChar.style.backgroundColor = 'green';
                } // END if
                // If letter is correct but placement is not, LB and GB backgrounds yellow
                else if(correctWord.includes(wordChars[i])){
                    placeChar.style.backgroundColor = 'yellow';
                    lbChar.style.backgroundColor = 'yellow';
                } // END else if
                // If letter not in word, backgrounds white
                else{
                    placeChar.style.backgroundColor = 'white';
                    lbChar.style.backgroundColor = 'white';
                } // END else
            } // END for

            // If guessed word is the correct word, alert win!!
            if(guessWord === correctWord.toLowerCase()){
                alert('You win!')
                return;
            } // END if
            // If out of guesses and word not correct, reveal word
            if(guessCount == 6){
                alert('You lose. The word was: ' + correctWord)
                return;
            } // END if
        } // END checkWord
    </script>
</head>

<body>
